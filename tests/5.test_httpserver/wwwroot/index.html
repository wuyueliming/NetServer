<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HTTP Server Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        .echo-box { margin-top: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
        input[type="text"] { width: 70%; padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 16px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        #result { margin-top: 15px; padding: 10px; min-height: 20px; border-radius: 4px; display: none; }
        .success { background: #e8f5e9; border: 1px solid #4CAF50; color: #2e7d32; }
        ul { line-height: 1.8; }
    </style>
</head>
<body>
    <h1>Welcome to HTTP Server!</h1>
    <p>This is a test page for the HTTP server.</p>
    <ul>
        <li><a href="/hello">/hello</a> - Hello World</li>
        <li><a href="/numbers">/numbers</a> - Numbers 0-9</li>
    </ul>

    <div class="echo-box">
        <h3>Echo Test</h3>
        <input type="text" id="msgInput" placeholder="Type something..." onkeydown="if(event.key==='Enter') doEcho()">
        <button onclick="doEcho()">Send</button>
        <div id="result"></div>
    </div>

    <script>
        function doEcho() {
            var input = document.getElementById('msgInput');
            var result = document.getElementById('result');
            var msg = input.value.trim();
            if (!msg) return;
            fetch('/echo?msg=' + encodeURIComponent(msg))
                .then(function(r) { return r.text(); })
                .then(function(text) {
                    result.className = 'success';
                    result.style.display = 'block';
                    result.textContent = text;
                })
                .catch(function(e) {
                    result.style.display = 'block';
                    result.textContent = 'Error: ' + e.message;
                });
        }
    </script>
</body>
</html>
